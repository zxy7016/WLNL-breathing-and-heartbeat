name: Deploy Vue Project
on:
  push:
    branches: [ main ] # 只要你 push 到 main，就自动触发
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # 告诉 GitHub，打包后的产物在 dist 文件夹里
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4